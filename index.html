<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gallery</title>
  <meta name="description" content="A simple, beautiful image gallery." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>The Gallery</h1>
    <p>A simple collection of the Cube</p>
  </header>

  <main>
    <div class="gallery-grid" role="list" aria-label="Image gallery">

      <!-- <div class="gallery-item" role="listitem" aria-label="Mountains">
        <img src="https://picsum.photos/seed/mountains/800/600" alt="Mountains" loading="lazy" />
        <div class="overlay"><span class="overlay-caption">Mountains</span></div>
      </div> -->

      <div class="gallery-item" role="listitem" aria-label="Wetsuit Man">
        <img src="images/wetsuit.jpg" alt="Wetsuit Man" loading="eager" />
        <div class="overlay"><span class="overlay-caption">Wetsuit Man</span></div>
      </div>

    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
    <div class="lightbox-inner">
      <img id="lightbox-img" src="" alt="" />
      <p id="lightbox-caption" class="lightbox-caption"></p>
    </div>
    <button id="lightbox-close" class="lightbox-close" aria-label="Close lightbox">&#x2715;</button>
    <button id="lightbox-prev" class="lightbox-prev" aria-label="Previous image">&#x2190;</button>
    <button id="lightbox-next" class="lightbox-next" aria-label="Next image">&#x2192;</button>
    <div id="lightbox-counter" class="lightbox-counter" aria-live="polite"></div>
  </div>

  <footer>
    <p>The Gallery &mdash; Images via th Cube</p>
  </footer>

  <script src="js/gallery.js"></script>
</body>
</html>
